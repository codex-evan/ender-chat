name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Debug environment
        run: |
          echo "=== Node.js version ==="
          node --version || echo "node not found"
          echo "=== npm version ==="
          npm --version || echo "npm not found"
          echo "=== Flutter version ==="
          flutter --version
          echo "=== macOS version ==="
          sw_vers
          echo "=== Xcode version ==="
          xcodebuild -version

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Enable iOS support
        run: flutter config --enable-ios

      - name: Get dependencies
        run: |
          cd app
          flutter pub get
          flutter pub upgrade

      - name: Install pods
        run: |
          cd app
          cd ios
          pod install --repo-update

      - name: Build IPA
        run: |
          cd app
          flutter build ios --release --no-codesign --verbose
        timeout-minutes: 30

      - name: Verify IPA
        run: |
          ls -la app/build/ios/iphoneos/
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: encchat-ios
          path: app/build/ios/iphoneos/Runner.ipa
          retention-days: 7
