name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          
      - name: Get dependencies
        run: flutter pub get
        
      - name: Build IPA
        run: |
          cd app
          flutter build ios --release --no-codesign
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: encchat-ios
          path: app/build/ios/iphoneos/Runner.ipa
