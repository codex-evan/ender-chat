name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - '.github/workflows/build-ios.yml'

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'

      - name: Prepare Flutter project
        run: |
          cd app
          flutter config --enable-ios --no-analytics
          flutter precache --ios
          flutter create \
            --platforms=ios \
            --org com.encchat \
            --project-name enc_chat \
            /tmp/enc_chat_scaffold
          rm -rf ios
          cp -R /tmp/enc_chat_scaffold/ios ios
          flutter pub get

      - name: Analyze Dart sources
        run: |
          cd app
          flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Validate Xcode project
        run: |
          cd app
          xcodebuild -list -project ios/Runner.xcodeproj

      - name: Build IPA
        run: |
          cd app
          flutter build ios --release --no-codesign
          rm -rf build/ios/ipa/Payload
          mkdir -p build/ios/ipa/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -qry EncChat-unsigned.ipa Payload
        timeout-minutes: 30

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: encchat-ios
          path: app/build/ios/ipa/EncChat-unsigned.ipa
          retention-days: 7
