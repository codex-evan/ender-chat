name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - '.github/workflows/build-ios.yml'

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          cd app
          flutter pub get

      - name: Analyze Dart sources
        run: |
          cd app
          flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Regenerate iOS project and fix Podfile
        run: |
          cd app
          flutter create --platforms=ios .
          cat > ios/Podfile << 'PODFILE'
          # Uncomment this line to define a global platform for your project
          platform :ios, '12.0'

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['EXCLUDED_ARCHS[Sdk=iphonesimulator*]'] = 'arm64'
                config.build_settings['EXCLUDED_ARCHS[Sdk=iphoneos*]'] = ''
                config.build_settings['APPLICATION_EXTENSION_API_ONLY'] = 'NO'
                flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
              end
            end
          end
          PODFILE

      - name: Install iOS pods
        run: |
          cd app/ios
          pod install --repo-update

      - name: Build IPA
        id: build
        run: |
          cd app
          flutter build ios --release --no-codesign 2>&1 | tee build-ios.log
          mkdir -p build/ios/ipa/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -qry EncChat-unsigned.ipa Payload
        timeout-minutes: 30

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: encchat-ios
          path: app/build/ios/ipa/EncChat-unsigned.ipa
          retention-days: 7
