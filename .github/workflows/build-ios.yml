name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - '.github/workflows/build-ios.yml'

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          cd app
          flutter pub get

      - name: Analyze Dart sources
        run: |
          cd app
          flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Regenerate iOS project
        run: |
          cd app
          flutter create --platforms=ios .

      - name: Install iOS pods
        run: |
          cd app/ios
          pod install --repo-update

      - name: Build IPA
        id: build
        run: |
          cd app
          flutter build ios --release --no-codesign 2>&1 | tee build-ios.log
          mkdir -p build/ios/ipa/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -qry EncChat-unsigned.ipa Payload
        timeout-minutes: 30

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: encchat-ios
          path: app/build/ios/ipa/EncChat-unsigned.ipa
          retention-days: 7
