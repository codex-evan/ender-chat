version: '3.8'

services:
  chat-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: encrypted-chat-server
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MESSAGE_TTL_DAYS=7
      - MAX_FILE_SIZE=104857600
      - RATE_LIMIT_MAX_REQUESTS=100
      - CLEANUP_INTERVAL_MINUTES=60
      - LOG_LEVEL=warn
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: Caddy reverse proxy with HTTPS
  caddy:
    image: caddy:latest
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - chat-server
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
