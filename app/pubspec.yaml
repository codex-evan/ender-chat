name: enc_chat
description: Anonymous end-to-end encrypted chat application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State management
  provider: ^6.1.1
  
  # Networking
  web_socket_channel: ^2.4.0
  dio: ^5.4.0
  
  # Local storage
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  crypto: ^3.0.3
  
  # Encryption
  pointycastle: ^3.7.3
  encrypt: ^5.0.3
  
  # UI
  cached_network_image: ^3.3.0
  image_picker: ^1.0.5
  file_picker: ^11.0.2
  video_player: ^2.8.1
  photo_view: ^0.15.0
  flutter_slidable: ^3.0.1
  shimmer: ^3.0.0
  
  # Utilities
  uuid: ^4.3.3
  share_plus: ^7.2.1
  url_launcher: ^6.2.1
  permission_handler: ^11.2.0
  flutter_secure_storage: ^9.0.0
  intl: ^0.19.0
  package_info_plus: ^9.0.1
  
  # Media
  flutter_image_compress: ^2.1.0
  
  # Audio
  record: ^5.0.4
  audioplayers: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
